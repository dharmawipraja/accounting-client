<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Buku — Akuntansi</title>
    <script>
      // Apply the persisted theme BEFORE first paint so dark mode doesn't flash
      // light on load. Reads the zustand-persist envelope written by src/stores/theme.tsx.
      try {
        var bukuTheme = JSON.parse(localStorage.getItem('buku.theme') || 'null');
        if (bukuTheme && bukuTheme.state && bukuTheme.state.theme === 'dark') {
          document.documentElement.classList.add('dark');
        }
      } catch (e) {
        /* corrupt persist entry: default (light) wins */
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
