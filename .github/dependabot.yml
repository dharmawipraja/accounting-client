version: 2
updates:
  # Application dependencies (npm/pnpm).
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    # Collapse routine minor/patch bumps into a few grouped PRs to cut noise;
    # major bumps still come as individual PRs so they can be reviewed alone.
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  # Keep the GitHub Actions themselves (checkout, setup-node, etc.) current.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
